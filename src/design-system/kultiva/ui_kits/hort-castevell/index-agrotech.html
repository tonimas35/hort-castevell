<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<title>Kultiva — Agro-Tech</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles-agrotech.css">
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Shared.jsx"></script>
  <script type="text/babel" src="Cards.jsx"></script>
  <script type="text/babel" src="Charts.jsx"></script>
  <script type="text/babel" src="ControlComponents.jsx"></script>
  <script type="text/babel" src="Pages1.jsx"></script>
  <script type="text/babel" src="Pages2.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const NODES = [
      { humidity_pct: 62, battery_v: 3.85, last_seen_s: 720, irrigating: false },
      { humidity_pct: 40, battery_v: 3.92, last_seen_s: 1200, irrigating: false },
      { humidity_pct: 21, battery_v: 3.71, last_seen_s: 600,  irrigating: true, irrigation_elapsed_min: 4, irrigation_total_min: 20 },
      { humidity_pct: 85, battery_v: 4.01, last_seen_s: 45,   irrigating: false },
    ];
    const AMBIENT = { temperature: 23.5, humidity: 58, lux: 45200 };

    function App(){
      const [page, setPage] = useState(() => localStorage.getItem('hc-page-v2') || 'dashboard');
      useEffect(()=>localStorage.setItem('hc-page-v2', page), [page]);
      let view;
      if (page==='dashboard') view = <DashboardPage online={true} lastUpdate="17:42" nodes={NODES} ambient={AMBIENT} onNavigate={setPage}/>;
      else if (page==='3d')   view = <Scene3DPage  online={true} nodes={NODES} ambient={AMBIENT} onNavigate={setPage}/>;
      else if (page==='control') view = <ControlPage online={true} lastUpdate="17:42" nodes={NODES} onNavigate={setPage}/>;
      else view = <DeviceLogPage online={true} lastUpdate="17:42" onNavigate={setPage}/>;
      return view;
    }
    ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>
</body>
</html>
