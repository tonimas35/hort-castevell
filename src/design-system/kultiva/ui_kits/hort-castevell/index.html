<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<title>Hort Castevell — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<style>
  /* Page switcher (dev chrome) */
  .page-switcher{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(58,50,37,.92);backdrop-filter:blur(12px);padding:5px;border-radius:999px;display:flex;gap:2px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .page-switcher button{color:rgba(253,250,243,.7);padding:7px 16px;border-radius:999px;font-size:.78rem;font-weight:500;font-family:var(--font-body)}
  .page-switcher button:hover{color:#FDFAF3}
  .page-switcher button.active{background:#FDFAF3;color:#3A3225;font-weight:600}
</style>
</head>
<body>
  <div id="app"></div>
  <div class="page-switcher" id="switcher"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Shared.jsx"></script>
  <script type="text/babel" src="Cards.jsx"></script>
  <script type="text/babel" src="Charts.jsx"></script>
  <script type="text/babel" src="ControlComponents.jsx"></script>
  <script type="text/babel" src="Pages1.jsx"></script>
  <script type="text/babel" src="Pages2.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const NODES = [
      { humidity_pct: 62, battery_v: 3.85, last_seen_s: 720 },
      { humidity_pct: 40, battery_v: 3.92, last_seen_s: 1200 },
      { humidity_pct: 21, battery_v: 3.71, last_seen_s: 600 },
      { humidity_pct: 85, battery_v: 4.01, last_seen_s: 45 },
    ];
    const AMBIENT = { temperature: 23.5, humidity: 58, lux: 45200 };

    function App(){
      const [page, setPage] = useState(() => localStorage.getItem('hc-page') || 'dashboard');
      const [online] = useState(true);
      useEffect(()=>localStorage.setItem('hc-page', page), [page]);

      const pages = [
        {id:'dashboard', label:'Dashboard'},
        {id:'3d',        label:'Vista 3D'},
        {id:'control',   label:'Control'},
        {id:'log',       label:'Log'},
      ];

      let view;
      if (page === 'dashboard') view = <DashboardPage online={online} lastUpdate="17:42" nodes={NODES} ambient={AMBIENT} onNavigate={setPage}/>;
      else if (page === '3d')   view = <Scene3DPage  online={online} nodes={NODES} ambient={AMBIENT} onNavigate={setPage}/>;
      else if (page === 'control') view = <ControlPage online={online} lastUpdate="17:42" nodes={NODES} onNavigate={setPage}/>;
      else view = <DeviceLogPage online={online} lastUpdate="17:42" onNavigate={setPage}/>;

      return (
        <>
          {view}
          <div className="page-switcher">
            {pages.map(p => (
              <button key={p.id} className={page===p.id?'active':''} onClick={()=>setPage(p.id)}>{p.label}</button>
            ))}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>
</body>
</html>
